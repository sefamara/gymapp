name: Build unsigned IPA

# Builds an unsigned .ipa on a GitHub-hosted macOS runner (no local Mac needed)
# so it can be re-signed and sideloaded on-device with a free Apple ID via
# SideStore/AltStore. Run manually from the Actions tab, or on every push to main.
on:
  workflow_dispatch: {}
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          # Bump this if the runner image doesn't have it yet — check available
          # versions with `xcodebuild -version` on the failing run, or see
          # https://github.com/actions/runner-images for the macos-15 image manifest.
          xcode-version: "26.0"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Archive (unsigned, device build)
        run: |
          xcodebuild archive \
            -project GymApp.xcodeproj \
            -scheme GymApp \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath build/GymApp.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package unsigned IPA
        run: |
          mkdir -p build/Payload
          cp -R "build/GymApp.xcarchive/Products/Applications/GymApp.app" build/Payload/
          cd build && zip -r GymApp.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: GymApp-unsigned
          path: build/GymApp.ipa
          retention-days: 14
